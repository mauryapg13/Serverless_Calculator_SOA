<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div id="history" class="history"></div>
            <div id="result" class="result">0</div>
        </div>
        <div class="keypad">
            <button class="key action" data-action="clear">AC</button>
            <button class="key action" data-action="delete">DEL</button>
            <button class="key operator" data-action="divide">÷</button>
            
            <button class="key number">7</button>
            <button class="key number">8</button>
            <button class="key number">9</button>
            <button class="key operator" data-action="multiply">×</button>
            
            <button class="key number">4</button>
            <button class="key number">5</button>
            <button class="key number">6</button>
            <button class="key operator" data-action="subtract">−</button>
            
            <button class="key number">1</button>
            <button class="key number">2</button>
            <button class="key number">3</button>
            <button class="key operator" data-action="add">+</button>
            
            <button class="key number zero">0</button>
            <button class="key number">.</button>
            <button class="key equals" data-action="calculate">=</button>
        </div>
        
        <div id="game-container" style="display: none; flex-direction: column; align-items: center; width: 100%;">
            <canvas id="game-canvas" width="290" height="290" style="background-color: #000; border: 1px solid #333; border-radius: 8px;"></canvas>
            <div style="display: flex; justify-content: space-between; width: 100%; margin-top: 15px; align-items: center;">
                <span id="game-score" style="color: #fff; font-size: 16px;">Score: 0</span>
                <button id="exit-game" class="key action" style="height: 40px; font-size: 14px; padding: 0 15px;">Exit</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
